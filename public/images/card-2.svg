<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2e6ea6"/>
      <stop offset="60%" stop-color="#5a9cbf"/>
      <stop offset="100%" stop-color="#1a4a78"/>
    </linearGradient>
    <linearGradient id="sea2c" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e5e9a"/>
      <stop offset="100%" stop-color="#0d3060"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="url(#bg2)"/>

  <!-- Sea -->
  <path d="M0,370 Q200,358 400,368 Q600,378 800,362 L800,500 L0,500 Z" fill="url(#sea2c)"/>
  <!-- Sea shimmer -->
  <g fill="none" stroke="white" stroke-width="1.2" opacity="0.25">
    <path d="M0,385 Q100,380 200,385 Q300,390 400,385 Q500,380 600,385 Q700,390 800,385"/>
    <path d="M0,405 Q100,400 200,405 Q300,410 400,405 Q500,400 600,405 Q700,410 800,405"/>
    <path d="M0,425 Q100,420 200,425 Q300,430 400,425 Q500,420 600,425 Q700,430 800,425"/>
    <path d="M0,448 Q100,443 200,448 Q300,453 400,448 Q500,443 600,448 Q700,453 800,448"/>
  </g>

  <!-- Horizon mist -->
  <rect x="0" y="360" width="800" height="20" fill="white" opacity="0.08"/>

  <!-- Wind flow lines (background) -->
  <g fill="none" stroke="white" stroke-width="2" opacity="0.18" stroke-linecap="round">
    <path d="M0,120 Q150,105 300,120 Q450,135 600,118 Q700,108 800,120"/>
    <path d="M0,155 Q120,138 240,152 Q360,166 480,150 Q600,134 720,150 Q760,155 800,152"/>
    <path d="M0,188 Q100,200 200,185 Q300,170 400,185 Q500,200 600,185 Q700,170 800,185"/>
    <path d="M0,220 Q130,208 260,220 Q390,232 520,218 Q650,204 780,218 L800,220"/>
    <path d="M0,255 Q90,265 180,252 Q270,239 360,252 Q450,265 540,252 Q630,239 720,252 L800,256"/>
    <path d="M0,290 Q110,278 220,290 Q330,302 440,290 Q550,278 660,290 Q730,298 800,290"/>
  </g>

  <!-- Wind turbine (large, center) -->
  <g>
    <!-- Tower -->
    <polygon points="392,175 396,375 404,375 408,175" fill="#e8e8e8"/>
    <!-- Nacelle -->
    <rect x="388" y="170" width="24" height="12" rx="3" fill="#d0d0d0"/>
    <!-- Hub -->
    <circle cx="400" cy="175" r="10" fill="#c0c0c0"/>
    <circle cx="400" cy="175" r="5"  fill="#a8a8a8"/>
    <!-- Blade 1 (up) -->
    <path d="M400,175 C396,155 392,120 396,80 C398,60 404,55 406,75 C408,100 406,155 400,175 Z" fill="white"/>
    <!-- Blade 2 (lower-left) -->
    <path d="M400,175 C384,182 352,196 316,208 C298,214 292,210 300,202 C312,190 348,180 400,175 Z" fill="#f0f0f0"/>
    <!-- Blade 3 (lower-right) -->
    <path d="M400,175 C416,182 448,196 484,208 C502,214 508,210 500,202 C488,190 452,180 400,175 Z" fill="white"/>
  </g>

  <!-- Wind turbine (left, smaller) -->
  <g opacity="0.75">
    <polygon points="196,215 199,370 205,370 208,215" fill="#d8d8d8"/>
    <rect x="193" y="210" width="18" height="9" rx="2" fill="#c8c8c8"/>
    <circle cx="200" cy="213" r="7" fill="#b8b8b8"/>
    <!-- Blades -->
    <path d="M200,213 C197,198 194,172 197,140 C199,126 203,123 204,138 C205,158 204,198 200,213 Z" fill="white" opacity="0.9"/>
    <path d="M200,213 C188,219 166,228 140,236 C128,240 124,237 130,231 C139,222 163,217 200,213 Z" fill="#eeeeee" opacity="0.9"/>
    <path d="M200,213 C212,219 234,228 260,236 C272,240 276,237 270,231 C261,222 237,217 200,213 Z" fill="white" opacity="0.9"/>
  </g>

  <!-- Wind turbine (right, smaller) -->
  <g opacity="0.75">
    <polygon points="594,210 597,368 603,368 606,210" fill="#d8d8d8"/>
    <rect x="591" y="205" width="18" height="9" rx="2" fill="#c8c8c8"/>
    <circle cx="600" cy="208" r="7" fill="#b8b8b8"/>
    <path d="M600,208 C597,193 594,167 597,135 C599,121 603,118 604,133 C605,153 604,193 600,208 Z" fill="white" opacity="0.9"/>
    <path d="M600,208 C588,214 566,223 540,231 C528,235 524,232 530,226 C539,217 563,212 600,208 Z" fill="#eeeeee" opacity="0.9"/>
    <path d="M600,208 C612,214 634,223 660,231 C672,235 676,232 670,226 C661,217 637,212 600,208 Z" fill="white" opacity="0.9"/>
  </g>

  <!-- Turbine far left (small) -->
  <g opacity="0.45">
    <rect x="90" y="245" width="5" height="120" rx="2" fill="#d0d0d0"/>
    <line x1="93" y1="245" x2="93" y2="208" stroke="white" stroke-width="5" stroke-linecap="round"/>
    <line x1="93" y1="245" x2="63"  y2="264" stroke="white" stroke-width="5" stroke-linecap="round"/>
    <line x1="93" y1="245" x2="123" y2="264" stroke="white" stroke-width="5" stroke-linecap="round"/>
    <circle cx="93" cy="245" r="5" fill="#c0c0c0"/>
  </g>

  <!-- Turbine far right (small) -->
  <g opacity="0.45">
    <rect x="706" y="248" width="5" height="118" rx="2" fill="#d0d0d0"/>
    <line x1="709" y1="248" x2="709" y2="211" stroke="white" stroke-width="5" stroke-linecap="round"/>
    <line x1="709" y1="248" x2="679" y2="267" stroke="white" stroke-width="5" stroke-linecap="round"/>
    <line x1="709" y1="248" x2="739" y2="267" stroke="white" stroke-width="5" stroke-linecap="round"/>
    <circle cx="709" cy="248" r="5" fill="#c0c0c0"/>
  </g>

  <!-- Reflections on sea -->
  <g opacity="0.15" fill="white">
    <ellipse cx="400" cy="378" rx="5" ry="20"/>
    <ellipse cx="200" cy="372" rx="3" ry="14"/>
    <ellipse cx="600" cy="374" rx="3" ry="14"/>
  </g>

  <!-- Text label -->
  <rect x="20" y="434" width="200" height="48" rx="6" fill="rgba(0,0,0,0.4)"/>
  <text x="32" y="453" font-family="'Noto Sans JP',sans-serif" font-size="12" fill="#aad8f0" font-weight="bold">事業区分Ⅱ</text>
  <text x="32" y="474" font-family="'Noto Sans JP',sans-serif" font-size="14" fill="white" font-weight="bold">風力発電設備</text>
</svg>
