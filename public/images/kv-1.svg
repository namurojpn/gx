<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="sky1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4a90c8"/>
      <stop offset="60%" stop-color="#87ceeb"/>
      <stop offset="100%" stop-color="#c8e8f5"/>
    </linearGradient>
    <linearGradient id="hill1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3a8aaa"/>
      <stop offset="100%" stop-color="#1a5a80"/>
    </linearGradient>
    <linearGradient id="panel1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e4d8c"/>
      <stop offset="100%" stop-color="#0d2b5e"/>
    </linearGradient>
    <radialGradient id="sun1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffe066"/>
      <stop offset="60%" stop-color="#f5a623"/>
      <stop offset="100%" stop-color="#e8920a"/>
    </radialGradient>
  </defs>

  <!-- Sky -->
