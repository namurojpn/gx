<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="sky3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5a9eb8"/>
      <stop offset="100%" stop-color="#c0dce8"/>
    </linearGradient>
    <linearGradient id="forest3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a6a8a"/>
      <stop offset="100%" stop-color="#1a3a5a"/>
    </linearGradient>
    <linearGradient id="building3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8a9aa8"/>
      <stop offset="100%" stop-color="#607080"/>
    </linearGradient>
    <linearGradient id="roof3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4a6880"/>
      <stop offset="100%" stop-color="#3a5068"/>
    </linearGradient>
  </defs>

  <!-- Sky -->
  <rect width="800" height="500" fill="url(#sky3)"/>

  <!-- Background hills -->
  <ellipse cx="100"  cy="360" rx="160" ry="80" fill="#3a7aaa" opacity="0.45"/>
  <ellipse cx="680"  cy="350" rx="200" ry="90" fill="#2d7496" opacity="0.4"/>
  <ellipse cx="400"  cy="380" rx="280" ry="70" fill="#3a7aaa" opacity="0.3"/>

  <!-- Ground -->
  <rect x="0" y="390" width="800" height="110" fill="#2a4a7a"/>

  <!-- Path / road -->
  <path d="M350,500 L380,390 L420,390 L450,500 Z" fill="#c8b870" opacity="0.5"/>

  <!-- === Forest left side === -->
  <!-- Tree group far left -->
  <g fill="#1a4b7a">
    <polygon points="30,330 55,260 80,330"/>
    <polygon points="25,350 55,275 85,350"/>
    <rect x="48" y="350" width="14" height="45" fill="#5a3010"/>
  </g>
  <g fill="#1a5080">
    <polygon points="70,320 98,245 126,320"/>
    <polygon points="65,340 98,260 131,340"/>
    <rect x="91" y="340" width="14" height="55" fill="#5a3010"/>
  </g>
  <g fill="#1a4b7a">
    <polygon points="115,335 140,265 165,335"/>
    <polygon points="110,355 140,278 170,355"/>
    <rect x="133" y="355" width="14" height="40" fill="#4a2808"/>
  </g>
  <g fill="#2268a4">
    <polygon points="155,325 183,250 211,325"/>
    <polygon points="150,348 183,265 216,348"/>
    <rect x="176" y="348" width="14" height="47" fill="#5a3010"/>
  </g>
  <g fill="#1a5878">
    <polygon points="195,330 222,258 249,330"/>
    <polygon points="190,352 222,272 254,352"/>
    <rect x="215" y="352" width="14" height="43" fill="#4a2808"/>
  </g>

  <!-- Wood logs pile (lower left) -->
  <g opacity="0.9">
    <ellipse cx="65" cy="415" rx="30" ry="10" fill="#8b5e3c"/>
    <rect x="36" y="405" width="58" height="12" rx="6" fill="#a06a40"/>
    <ellipse cx="65" cy="402" rx="30" ry="8" fill="#c07a4a"/>
    <rect x="36" y="392" width="58" height="12" rx="6" fill="#a06a40"/>
    <ellipse cx="65" cy="390" rx="30" ry="8" fill="#c07a4a"/>

    <ellipse cx="130" cy="418" rx="28" ry="9" fill="#8b5e3c"/>
    <rect x="103" y="408" width="54" height="11" rx="5" fill="#a06a40"/>
    <ellipse cx="130" cy="406" rx="28" ry="8" fill="#c07a4a"/>
    <rect x="103" y="396" width="54" height="11" rx="5" fill="#a06a40"/>
    <ellipse cx="130" cy="394" rx="28" ry="8" fill="#b87848"/>
  </g>

  <!-- === Main facility building === -->
  <!-- Main building -->
  <rect x="300" y="280" width="220" height="140" fill="url(#building3)" rx="2"/>
  <rect x="300" y="275" width="220" height="20" fill="url(#roof3)" rx="2"/>
  <!-- Windows -->
  <g fill="#a8d0e0" opacity="0.7">
    <rect x="320" y="300" width="30" height="22" rx="2"/>
    <rect x="362" y="300" width="30" height="22" rx="2"/>
    <rect x="404" y="300" width="30" height="22" rx="2"/>
    <rect x="446" y="300" width="30" height="22" rx="2"/>
    <rect x="320" y="338" width="30" height="22" rx="2"/>
    <rect x="362" y="338" width="30" height="22" rx="2"/>
    <rect x="404" y="338" width="30" height="22" rx="2"/>
    <rect x="446" y="338" width="30" height="22" rx="2"/>
  </g>
  <!-- Door -->
  <rect x="385" y="378" width="50" height="42" rx="3" fill="#7a5030"/>
  <circle cx="420" cy="400" r="3" fill="#c8a060"/>

  <!-- Silo / storage tanks -->
  <rect x="255" y="310" width="40" height="110" rx="5" fill="#9aacba"/>
  <ellipse cx="275" cy="310" rx="20" ry="8" fill="#b0c0cc"/>
  <ellipse cx="275" cy="315" rx="20" ry="8" fill="#aabac8"/>

  <!-- Conveyor pipe -->
  <path d="M220,360 Q255,340 275,360" fill="none" stroke="#7a8a98" stroke-width="8" stroke-linecap="round"/>

  <!-- Large chimney 1 -->
  <rect x="535" y="220" width="28" height="185" rx="4" fill="#7a8a98"/>
  <ellipse cx="549" cy="220" rx="14" ry="6" fill="#8a9aaa"/>
  <!-- Steam plume 1 -->
  <g opacity="0.7" fill="white">
    <ellipse cx="549" cy="198" rx="16" ry="12"/>
    <ellipse cx="554" cy="178" rx="13" ry="11"/>
    <ellipse cx="547" cy="158" rx="11" ry="10"/>
    <ellipse cx="552" cy="140" rx="9"  ry="8"/>
    <ellipse cx="546" cy="125" rx="7"  ry="7"/>
  </g>

  <!-- Large chimney 2 -->
  <rect x="580" y="235" width="24" height="175" rx="4" fill="#7a8a98"/>
  <ellipse cx="592" cy="235" rx="12" ry="5" fill="#8a9aaa"/>
  <!-- Steam plume 2 -->
  <g opacity="0.65" fill="white">
    <ellipse cx="592" cy="215" rx="14" ry="11"/>
    <ellipse cx="596" cy="196" rx="12" ry="10"/>
    <ellipse cx="590" cy="178" rx="10" ry="9"/>
    <ellipse cx="594" cy="162" rx="8"  ry="7"/>
  </g>

  <!-- Power lines -->
  <g stroke="#555" stroke-width="1.5" fill="none" opacity="0.6">
    <line x1="630" y1="280" x2="630" y2="395"/>
    <line x1="680" y1="270" x2="680" y2="395"/>
    <line x1="730" y1="280" x2="730" y2="395"/>
    <line x1="780" y1="290" x2="780" y2="395"/>
    <path d="M630,298 Q655,305 680,298 Q705,291 730,298 Q755,305 780,298" fill="none"/>
    <path d="M630,315 Q655,322 680,315 Q705,308 730,315 Q755,322 780,315" fill="none"/>
  </g>
  <!-- Pylon cross-arms -->
  <g stroke="#555" stroke-width="2">
    <line x1="620" y1="288" x2="640" y2="288"/>
    <line x1="670" y1="278" x2="690" y2="278"/>
    <line x1="720" y1="288" x2="740" y2="288"/>
  </g>

  <!-- Forest right side -->
  <g fill="#1a4b7a" opacity="0.8">
    <polygon points="640,380 660,315 680,380"/>
    <polygon points="670,370 698,300 726,370"/>
    <polygon points="710,375 733,312 756,375"/>
    <polygon points="748,368 768,308 788,368"/>
  </g>
  <g fill="#1a5080" opacity="0.7">
    <polygon points="648,395 668,328 688,395"/>
    <polygon points="678,388 705,318 732,388"/>
    <polygon points="718,392 740,325 762,392"/>
    <polygon points="755,385 774,322 793,385"/>
  </g>

  <!-- Label -->
  <rect x="580" y="456" width="200" height="32" rx="5" fill="rgba(0,0,0,0.45)"/>
  <text x="590" y="477" font-family="'Noto Sans JP',sans-serif" font-size="15" fill="white" font-weight="bold">バイオマス発電設備</text>
</svg>
