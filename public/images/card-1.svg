<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f2d5e"/>
      <stop offset="100%" stop-color="#1a4b8a"/>
    </linearGradient>
    <linearGradient id="panel1c" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#1e4d8c"/>
      <stop offset="100%" stop-color="#2d6ab0"/>
    </linearGradient>
    <radialGradient id="sun1c" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fff5aa"/>
      <stop offset="50%" stop-color="#f5a623"/>
      <stop offset="100%" stop-color="#f5a623" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="vg1" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="white" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#0a1e40" stop-opacity="0.35"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="url(#bg1)"/>
  <rect width="800" height="500" fill="url(#vg1)"/>

  <!-- Sky gradient layer -->
  <rect x="0" y="0" width="800" height="320" fill="#1e5aa0" opacity="0.25"/>

  <!-- Sun glow top-right -->
  <circle cx="660" cy="75" r="95" fill="url(#sun1c)" opacity="0.55"/>
  <circle cx="660" cy="75" r="42" fill="#f5a623" opacity="0.55"/>
  <circle cx="660" cy="75" r="26" fill="#ffe066" opacity="0.85"/>
  <g stroke="#f5a623" stroke-width="2.5" stroke-linecap="round" opacity="0.45">
    <line x1="660" y1="17" x2="660" y2="4"/>
    <line x1="703" y1="32" x2="714" y2="21"/>
    <line x1="718" y1="75" x2="732" y2="75"/>
    <line x1="703" y1="118" x2="714" y2="129"/>
    <line x1="660" y1="133" x2="660" y2="146"/>
    <line x1="617" y1="118" x2="606" y2="129"/>
    <line x1="602" y1="75" x2="588" y2="75"/>
    <line x1="617" y1="32" x2="606" y2="21"/>
  </g>

  <!-- Isometric solar panel array -->
  <!-- Row 1 (back) -->
  <g transform="translate(200, 110)">
    <polygon points="0,80  80,40  160,80  80,120" fill="#1e4d8c" stroke="#2a60a8" stroke-width="1"/>
    <polygon points="80,40 160,0  240,40  160,80" fill="#1e4d8c" stroke="#2a60a8" stroke-width="1"/>
    <polygon points="160,0 240,-40 320,0  240,40" fill="#1e4d8c" stroke="#2a60a8" stroke-width="1"/>
    <!-- Highlights (light reflection) -->
    <polygon points="0,80   60,52  80,62  20,90"  fill="#3a7ac8" opacity="0.3"/>
    <polygon points="80,40  140,12 160,22 100,50" fill="#3a7ac8" opacity="0.3"/>
    <!-- Cell lines row1 -->
    <line x1="40"  y1="60" x2="120" y2="100" stroke="#4a8ad8" stroke-width="0.7"/>
    <line x1="120" y1="20" x2="200" y2="60"  stroke="#4a8ad8" stroke-width="0.7"/>
    <line x1="200" y1="-20" x2="280" y2="20" stroke="#4a8ad8" stroke-width="0.7"/>
    <line x1="0"  y1="80"  x2="320" y2="-80" stroke="#4a8ad8" stroke-width="0.7"/>
    <line x1="0"  y1="100" x2="320" y2="-60" stroke="#4a8ad8" stroke-width="0.7"/>
    <!-- Front face -->
    <polygon points="0,80  80,120 80,148 0,108"   fill="#0a1e50"/>
    <polygon points="80,120 160,80 160,108 80,148" fill="#0d2358"/>
    <polygon points="160,80 240,40 240,68 160,108" fill="#0a1e50"/>
    <polygon points="240,40 320,0  320,28 240,68"  fill="#0d2358"/>
    <!-- Supports -->
    <line x1="40"  y1="134" x2="40"  y2="172" stroke="#6080a0" stroke-width="3"/>
    <line x1="120" y1="134" x2="120" y2="172" stroke="#6080a0" stroke-width="3"/>
    <line x1="200" y1="94"  x2="200" y2="132" stroke="#6080a0" stroke-width="3"/>
    <line x1="280" y1="54"  x2="280" y2="92"  stroke="#6080a0" stroke-width="3"/>
  </g>

  <!-- Row 2 (front) -->
  <g transform="translate(160, 195)">
    <polygon points="0,80  80,40  160,80  80,120" fill="#163e7a" stroke="#2a60a8" stroke-width="1"/>
    <polygon points="80,40 160,0  240,40  160,80" fill="#163e7a" stroke="#2a60a8" stroke-width="1"/>
    <polygon points="160,0 240,-40 320,0  240,40" fill="#163e7a" stroke="#2a60a8" stroke-width="1"/>
    <polygon points="320,0 400,-40 480,0  400,40" fill="#163e7a" stroke="#2a60a8" stroke-width="1"/>
    <polygon points="0,80   60,52  80,62  20,90"  fill="#3a7ac8" opacity="0.25"/>
    <polygon points="80,40  140,12 160,22 100,50" fill="#3a7ac8" opacity="0.25"/>
    <line x1="40"  y1="60"  x2="120" y2="100" stroke="#4a8ad8" stroke-width="0.7"/>
    <line x1="120" y1="20"  x2="200" y2="60"  stroke="#4a8ad8" stroke-width="0.7"/>
    <line x1="200" y1="-20" x2="280" y2="20"  stroke="#4a8ad8" stroke-width="0.7"/>
    <line x1="280" y1="-60" x2="360" y2="-20" stroke="#4a8ad8" stroke-width="0.7"/>
    <line x1="0"  y1="80"  x2="480" y2="-160" stroke="#4a8ad8" stroke-width="0.7"/>
    <line x1="0"  y1="100" x2="480" y2="-140" stroke="#4a8ad8" stroke-width="0.7"/>
    <polygon points="0,80   80,120  80,150 0,110"    fill="#091830"/>
    <polygon points="80,120 160,80  160,110 80,150"  fill="#0a1e3a"/>
    <polygon points="160,80 240,40  240,70  160,110" fill="#091830"/>
    <polygon points="240,40 320,0   320,30  240,70"  fill="#0a1e3a"/>
    <polygon points="320,0  400,-40 400,-10 320,30"  fill="#091830"/>
    <line x1="40"  y1="136" x2="40"  y2="176" stroke="#507898" stroke-width="3"/>
    <line x1="120" y1="136" x2="120" y2="176" stroke="#507898" stroke-width="3"/>
    <line x1="200" y1="96"  x2="200" y2="136" stroke="#507898" stroke-width="3"/>
    <line x1="280" y1="56"  x2="280" y2="96"  stroke="#507898" stroke-width="3"/>
    <line x1="360" y1="16"  x2="360" y2="56"  stroke="#507898" stroke-width="3"/>
  </g>

  <!-- Ground surface -->
  <path d="M0,435 Q400,420 800,435 L800,500 L0,500 Z" fill="#0a1e40" opacity="0.85"/>

  <!-- Horizon glow -->
  <rect x="0" y="380" width="800" height="60" fill="#2680c8" opacity="0.08"/>

  <!-- Text label -->
  <rect x="20" y="434" width="220" height="48" rx="6" fill="rgba(0,0,0,0.45)"/>
  <text x="32" y="453" font-family="'Noto Sans JP',sans-serif" font-size="12" fill="#90c8f0" font-weight="bold">事業区分Ⅰ</text>
  <text x="32" y="474" font-family="'Noto Sans JP',sans-serif" font-size="14" fill="white" font-weight="bold">太陽光発電設備</text>
</svg>
